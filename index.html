<style>

  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    width: 100%;
    max-width: 560px;
    padding: 32px 28px;
  }
  h1 { font-size: 1.5rem; color: #4a3b8c; text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #888; font-size: .9rem; margin-bottom: 24px; }

  /* 시작 화면 */
  .lesson-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
  .unit-head {
    display: flex; align-items: center; gap: 8px; padding: 6px 2px 2px;
    font-weight: 800; color: #4a3b8c; font-size: .92rem; cursor: pointer; user-select: none;
  }
  .unit-head input { width: 16px; height: 16px; accent-color: #667eea; cursor: pointer; }
  .range-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .range-head .section-label { margin-bottom: 0; }
  .btn-toggle-all { background: none; color: #8b7cc8; font-size: .78rem; padding: 4px 8px; font-weight: 600; }
  .btn-toggle-all:hover { color: #4a3b8c; }
  .btn-review {
    width: 100%; padding: 13px; color: #fff;
    background: linear-gradient(135deg, #f2994a, #f2c94c);
  }
  .btn-review:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(242,153,74,.4); }
  .btn-recent { background: linear-gradient(135deg, #eb5757, #f2994a); }
  .btn-recent:hover { box-shadow: 0 8px 20px rgba(235,87,87,.4); }

  /* 오답 랭킹 */
  .rank-list { display: flex; flex-direction: column; gap: 8px; max-height: 430px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px; }
  .rank-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f7f5ff; border-radius: 12px; }
  .rank-item.top3 { background: #fff7ec; }
  .rank-no { width: 36px; text-align: center; font-weight: 800; color: #8b7cc8; font-size: 1rem; flex-shrink: 0; }
  .rank-item.top3 .rank-no { font-size: 1.35rem; }
  .rank-word { flex: 1; min-width: 0; }
  .rank-word .en { font-weight: 800; color: #2d2456; }
  .rank-word .ko { font-size: .8rem; color: #999; margin-top: 1px; }
  .rank-bar { height: 6px; background: #e8e4f7; border-radius: 999px; margin-top: 6px; overflow: hidden; }
  .rank-bar > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #eb5757, #f2994a); }
  .rank-cnt { font-weight: 800; color: #c0392b; font-size: .9rem; white-space: nowrap; flex-shrink: 0; }
  .btn-speak-sm { background: #eee; width: 34px; height: 34px; border-radius: 50%; font-size: .95rem; flex-shrink: 0; }
  .btn-speak-sm:hover { background: #ddd; }
  .review-hint { font-size: .78rem; color: #b08968; margin-top: 8px; text-align: center; }
  .lesson-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border: 2px solid #e5e0f5; border-radius: 12px;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .lesson-item:hover { border-color: #b3a5e8; background: #f8f6ff; }
  .lesson-item input { width: 18px; height: 18px; accent-color: #667eea; cursor: pointer; }
  .lesson-item .name { font-weight: 600; color: #333; }
  .lesson-item .count { margin-left: auto; color: #999; font-size: .85rem; }
  .option-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    padding: 10px 16px; background: #f5f3fc; border-radius: 10px;
    cursor: pointer; user-select: none;
  }
  .option-row input { accent-color: #667eea; width: 16px; height: 16px; cursor: pointer; }
  .option-row span { font-size: .9rem; color: #555; }
  .mode-list { display: flex; gap: 10px; margin-bottom: 16px; }
  .mode-item {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
    padding: 12px 14px; border: 2px solid #e5e0f5; border-radius: 12px;
    cursor: pointer; transition: all .15s; user-select: none; text-align: center;
  }
  .mode-item:hover { border-color: #b3a5e8; background: #f8f6ff; }
  .mode-item.selected { border-color: #667eea; background: #f3f0ff; }
  .mode-item input { display: none; }
  .mode-item .mode-name { font-weight: 700; color: #4a3b8c; }
  .mode-item .mode-desc { font-size: .78rem; color: #999; }
  .section-label { font-size: .85rem; font-weight: 700; color: #777; margin-bottom: 8px; }

  /* 실시간 점수 */
  .score-line { display: flex; gap: 16px; justify-content: center; margin-bottom: 14px; font-weight: 700; font-size: .95rem; }
  .score-line .sc-ok { color: #27ae60; }
  .score-line .sc-no { color: #e74c3c; }

  .answer-reveal { margin-top: 18px; background: #f7f5ff; border-radius: 14px; padding: 20px; text-align: center; }
  .answer-label { font-size: .8rem; color: #999; font-weight: 700; margin-bottom: 6px; }
  .answer-word {
    font-size: 2rem; font-weight: 800; color: #2d2456; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .self-check-q { font-size: .95rem; color: #666; margin-bottom: 12px; }
  .write-input {
    width: 100%; padding: 14px 16px; font-size: 1.3rem; font-family: inherit;
    border: 2px solid #b3a5e8; border-radius: 12px; text-align: center;
    letter-spacing: 1px; color: #2d2456; outline: none;
  }
  .write-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
  .write-input:disabled { background: #f5f5f5; color: #999; }
  .write-hint { font-size: .75rem; color: #aaa; text-align: center; margin-top: 6px; }
  .btn-alt {
    width: 100%; padding: 10px; margin-top: 10px;
    background: none; color: #8b7cc8; font-size: .85rem; font-weight: 600;
  }
  .btn-alt:hover { color: #4a3b8c; background: #f5f3fc; }
  .my-answer { font-size: .95rem; color: #c0392b; margin-bottom: 6px; }

  .self-check { display: flex; gap: 10px; }
  .btn-self { flex: 1; padding: 14px; font-size: 1rem; }
  .btn-self.ok { background: #eafaf1; color: #1e8449; border: 2px solid #27ae60; }
  .btn-self.ok:hover { background: #d4f5e3; }
  .btn-self.no { background: #fdedec; color: #c0392b; border: 2px solid #e74c3c; }
  .btn-self.no:hover { background: #fadbd8; }

  /* 시험 기록 */
  .history-section { margin-top: 24px; }
  .history-title { font-size: .9rem; font-weight: 700; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .btn-clear-history { background: none; color: #bbb; font-size: .75rem; padding: 4px 8px; }
  .btn-clear-history:hover { color: #e74c3c; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 190px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #f7f5ff; border-radius: 10px; font-size: .82rem; flex-wrap: wrap; }
  .history-item .h-mode { font-weight: 700; color: #4a3b8c; white-space: nowrap; }
  .history-item .h-score { font-weight: 700; color: #333; white-space: nowrap; }
  .history-item .h-range { color: #999; }
  .history-item .h-date { color: #bbb; margin-left: auto; white-space: nowrap; }
  .history-empty { text-align: center; color: #bbb; font-size: .85rem; padding: 12px; }

  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 600; transition: all .15s;
  }
  .btn-primary {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,.4); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

    background: #eef; color: #556; font-size: .8rem; font-weight: 700;
    padding: 4px 12px; border-radius: 999px;

    background: #f0f0f0; color: #666; padding: 6px 14px; font-size: .82rem;
  }
  .btn-restart:hover { background: #e0e0e0; }
  .progress-track { background: #eee; border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill {
    height: 100%; border-radius: 999px; width: 0;
    background: linear-gradient(90deg, #667eea, #a78bfa); transition: width .3s;
  }
  .progress-text { font-size: .8rem; color: #999; text-align: right; margin-bottom: 18px; }

  .word-box { text-align: center; margin-bottom: 24px; }
  .word {
    font-size: 2.4rem; font-weight: 800; color: #2d2456; letter-spacing: .5px;
    display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .btn-speak {
    background: #eef; width: 42px; height: 42px; border-radius: 50%;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .btn-speak:hover { background: #dde; }
  .word-hint { font-size: .85rem; color: #aaa; margin-top: 6px; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    padding: 14px 18px; border: 2px solid #e5e0f5; border-radius: 12px;
    background: #fff; font-size: 1.05rem; text-align: left; color: #333;
    display: flex; align-items: center; gap: 12px;
  }
  .choice .num {
    background: #f0edfb; color: #7c6bd0; font-size: .8rem; font-weight: 700;
    width: 24px; height: 24px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .choice:hover:not(:disabled) { border-color: #a78bfa; background: #faf8ff; }
  .choice:disabled { cursor: default; }
  .choice.correct { border-color: #27ae60; background: #eafaf1; color: #1e8449; font-weight: 700; }
  .choice.correct .num { background: #27ae60; color: #fff; }
  .choice.wrong { border-color: #e74c3c; background: #fdedec; color: #c0392b; }
  .choice.wrong .num { background: #e74c3c; color: #fff; }
  .choice.dim { opacity: .45; }

  .feedback { text-align: center; margin-top: 18px; min-height: 30px; font-weight: 700; font-size: 1.05rem; }
  .feedback.ok { color: #27ae60; }
  .feedback.no { color: #e74c3c; }

  .btn-next { width: 100%; padding: 14px; margin-top: 14px; background: #4a3b8c; color: #fff; }
  .btn-next:hover { background: #5c4bad; }

  /* 결과 화면 */
  .result-emoji { font-size: 4rem; text-align: center; margin-bottom: 12px; }
  .result-title { text-align: center; font-size: 1.4rem; font-weight: 800; color: #2d2456; margin-bottom: 20px; }
  .stats { display: flex; gap: 10px; margin-bottom: 22px; }
  .stat {
    flex: 1; background: #f7f5ff; border-radius: 14px; padding: 16px 8px; text-align: center;
  }
  .stat .val { font-size: 1.6rem; font-weight: 800; color: #4a3b8c; }
  .stat .label { font-size: .78rem; color: #999; margin-top: 4px; }
  .wrong-list-title { font-size: .9rem; font-weight: 700; color: #666; margin-bottom: 10px; }
  .wrong-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 22px; max-height: 200px; overflow-y: auto; }
  .wrong-item {
    display: flex; justify-content: space-between; padding: 10px 14px;
    background: #fdf5f5; border-radius: 10px; font-size: .92rem;
  }
  .wrong-item .en { font-weight: 700; color: #b03a2e; }
  .wrong-item .ko { color: #666; }
  .wrong-item .cnt { color: #d98880; font-size: .8rem; margin-left: 8px; }
  .perfect-msg { text-align: center; color: #27ae60; font-weight: 600; margin-bottom: 22px; }

const ALL_WORDS = LESSONS.flatMap(l => l.words);

// ===== 상태 =====
let state = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

const app = document.getElementById("app");
const APP_VERSION = "v1.2 (2026-07-19)"; // 수정할 때마다 올려주면 업데이트 확인이 쉬움

// ===== 시험 기록 (localStorage) =====
const MODE_LABELS = { meaning: "📖 기본", spelling: "🔥 고난도", writing: "✍️ 최고난도" };
const HISTORY_KEY = "yuha-quiz-history";

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
  catch (e) { return []; }
}
function saveHistoryEntry(entry) {
  const h = loadHistory();
  h.unshift(entry);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 50))); } catch (e) {}
}
function fmtDate(ts) {
  const d = new Date(ts);
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${d.getMonth() + 1}/${d.getDate()} ${hh}:${mm}`;
}
function historyHTML() {
  const h = loadHistory();
  return `
    <div class="history-section">
      <div class="history-title">
        <span>📜 시험 기록</span>
        ${h.length ? `<button class="btn-clear-history" id="btn-clear-history">기록 지우기</button>` : ""}
      </div>
      ${h.length ? `<div class="history-list">
        ${h.map(e => `
          <div class="history-item">
            <span class="h-mode">${MODE_LABELS[e.mode] || e.mode}</span>
            <span class="h-score">${e.accuracy}% · ⭕${e.correct} ❌${e.attempts - e.correct}</span>
            <span class="h-range">${e.range}</span>
            <span class="h-date">${fmtDate(e.date)}</span>
          </div>`).join("")}
      </div>`
      : `<div class="history-empty">아직 시험 기록이 없어요. 첫 시험을 쳐 보세요!</div>`}
    </div>`;
}

// ===== 오답 통계 (누적, localStorage) =====
const WRONG_STATS_KEY = "yuha-wrong-stats";

function loadWrongStats() {
  try { return JSON.parse(localStorage.getItem(WRONG_STATS_KEY) || "{}"); }
  catch (e) { return {}; }
}
function bumpWrongStat(en, delta) {
  const stats = loadWrongStats();
  const next = (stats[en] || 0) + delta;
  if (next <= 0) delete stats[en];
  else stats[en] = next;
  try { localStorage.setItem(WRONG_STATS_KEY, JSON.stringify(stats)); } catch (e) {}
}
// 자주 틀리는 단어: 많이 틀린 순, 최대 20개
function reviewWords() {
  const stats = loadWrongStats();
  return ALL_WORDS.filter(w => stats[w.en] > 0)
    .sort((a, b) => stats[b.en] - stats[a.en])
    .slice(0, 20);
}

// 최근 친 시험 3번에서 틀린 단어 모음 (중복 제거)
function recentWrongWords() {
  const ens = [];
  loadHistory().slice(0, 3).forEach(e =>
    (e.wrongWords || []).forEach(en => { if (!ens.includes(en)) ens.push(en); })
  );
  return ens.map(en => ALL_WORDS.find(w => w.en === en)).filter(Boolean);
}

// ===== 오답 랭킹 화면 =====
function renderRanking() {
  state = {};
  speechSynthesis && speechSynthesis.cancel();
  const stats = loadWrongStats();
  const ranked = ALL_WORDS
    .filter(w => stats[w.en] > 0)
    .sort((a, b) => stats[b.en] - stats[a.en] || a.en.localeCompare(b.en))
    .slice(0, 30);
  const max = ranked.length ? stats[ranked[0].en] : 1;
  const medals = ["🥇", "🥈", "🥉"];

  app.innerHTML = `
    <h1>📊 많이 틀리는 단어 랭킹</h1>
    <p class="subtitle">지금까지 시험에서 틀린 횟수 순이에요 (복습에서 맞히면 줄어들어요)</p>
    ${ranked.length ? `<div class="rank-list">
      ${ranked.map((w, i) => `
        <div class="rank-item ${i < 3 ? "top3" : ""}">
          <span class="rank-no">${i < 3 ? medals[i] : (i + 1)}</span>
          <div class="rank-word">
            <div class="en">${w.en}</div>
            <div class="ko">${w.ko}</div>
            <div class="rank-bar"><div style="width:${Math.max(8, Math.round(stats[w.en] / max * 100))}%"></div></div>
          </div>
          <span class="rank-cnt">${stats[w.en]}회</span>
          <button class="btn-speak-sm" data-en="${w.en.replace(/"/g, "&quot;")}" title="발음 듣기">🔊</button>
        </div>`).join("")}
    </div>`
    : `<div class="history-empty">아직 틀린 단어가 없어요! 👏</div>`}
    <button class="btn-primary" id="btn-back">← 처음 화면으로</button>
  `;
  document.getElementById("btn-back").addEventListener("click", renderStart);
  app.querySelectorAll(".btn-speak-sm").forEach(b =>
    b.addEventListener("click", () => speak(b.dataset.en))
  );
}

// ===== 퀴즈 시작 =====
function startQuiz(words, tts, mode, range, isReview) {
  state = {
    tts,
    mode: mode || "meaning",
    range: range || "전체",
    isReview: !!isReview,
    totalWords: words.length,
    round: 1,
    queue: shuffle(words),
    idx: 0,
    wrongThisRound: [],
    totalAttempts: 0,
    totalCorrect: 0,
    wrongCount: {},   // en -> 틀린 횟수
    answered: false
  };
  renderQuestion();
}

function currentWord() { return state.queue[state.idx]; }

// 뜻이 겹치는 단어(예: get to·reach 둘 다 "도착하다")가 보기에 함께 나와
// 정답이 2개가 되는 것을 방지
function koTokens(ko) {
  return ko.split(/[,\/()~]/).map(s => s.trim()).filter(Boolean);
}
function koOverlap(a, b) {
  const A = koTokens(a);
  return koTokens(b).some(t => A.includes(t));
}

function makeChoices(word) {
  const others = shuffle(ALL_WORDS.filter(w => !koOverlap(w.ko, word.ko)));
  const distractors = [];
  const used = new Set([word.ko]);
  for (const o of others) {
    if (!used.has(o.ko)) { distractors.push(o.ko); used.add(o.ko); }
    if (distractors.length === 3) break;
  }
  return shuffle([word.ko, ...distractors]);
}

// 오타가 우연히 부적절한 단어가 되는 것 방지
const BAD_FORMS = new Set(["coon","fag","fap","ass","arse","anus","sex","tit","tits","cok",
  "cock","dick","cum","hoe","slut","homo","nig","chink","spic","kike","paki","pusy","pussy",
  "boob","boobs","butt","poo","pee","piss","crap","damn","hell"]);

// 그럴듯한 오타 스펠링 생성 (실제 단어와 겹치지 않게)
function misspell(word) {
  const vowels = "aeiou";
  const simMap = { c:"k", k:"c", s:"c", g:"j", j:"g", l:"r", r:"l",
                   m:"n", n:"m", t:"d", d:"t", p:"b", b:"p", f:"ph", v:"b", w:"wh" };
  const idxs = [...word].map((c, i) => /[a-z]/.test(c) ? i : -1).filter(i => i >= 0);
  for (let t = 0; t < 40; t++) {
    const strat = Math.floor(Math.random() * 5);
    const chars = [...word];
    const i = idxs[Math.floor(Math.random() * idxs.length)];
    if (strat === 0) {            // 이웃 글자 순서 바꾸기
      if (!idxs.includes(i + 1)) continue;
      [chars[i], chars[i + 1]] = [chars[i + 1], chars[i]];
      if (chars[i] === chars[i + 1]) continue;
    } else if (strat === 1) {     // 글자 하나 겹치기
      chars.splice(i, 0, chars[i]);
    } else if (strat === 2) {     // 모음 바꾸기
      if (!vowels.includes(chars[i])) continue;
      const others = vowels.replace(chars[i], "");
      chars[i] = others[Math.floor(Math.random() * others.length)];
    } else if (strat === 3) {     // 글자 하나 빼기
      if (idxs.length <= 3) continue;
      chars.splice(i, 1);
    } else {                      // 발음 비슷한 자음으로 바꾸기
      if (!(chars[i] in simMap)) continue;
      chars[i] = simMap[chars[i]];
    }
    const cand = chars.join("");
    if (cand !== word
        && !ALL_WORDS.some(w => w.en === cand)
        && !cand.split(/[^a-z]+/).some(tok => BAD_FORMS.has(tok))) return cand;
  }
  return word + word[word.length - 1]; // 안전장치
}

// 고난도: [정답, 정답의 오타] + [다른 단어, 그 단어의 오타] 2묶음 구성
function makeSpellingChoices(word) {
  for (let t = 0; t < 10; t++) {
    const other = shuffle(ALL_WORDS.filter(w => w.en !== word.en && !koOverlap(w.ko, word.ko)))[0];
    const set = [word.en, misspell(word.en), other.en, misspell(other.en)];
    if (new Set(set).size === 4) return shuffle(set);
  }
  // 중복 발생 시 안전장치: 기본 구성으로
  const others = shuffle(ALL_WORDS.filter(w => w.en !== word.en)).slice(0, 2).map(w => w.en);
  return shuffle([word.en, misspell(word.en), ...others]);
}

// ===== 문제 화면 =====
function renderQuestion() {
  const w = currentWord();
  const spelling = state.mode === "spelling";
  const writing = state.mode === "writing";
  const choices = writing ? [] : (spelling ? makeSpellingChoices(w) : makeChoices(w));
  state.answered = false;
  state.revealed = false;
  state.currentChoices = choices;
  state.correctValue = (spelling || writing) ? w.en : w.ko;

  const progress = (state.idx / state.queue.length) * 100;
  const isRetry = state.round > 1;

  app.innerHTML = `
    <div class="top-bar">
      <span class="round-badge ${isRetry ? "retry" : ""}">
        ${isRetry ? `🔁 오답 다시 풀기 (${state.round}차)` : "1차 시험"}
      </span>
      <button class="btn-restart" id="btn-restart">⟲ 처음부터</button>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-text">${state.idx + 1} / ${state.queue.length}</div>
    <div class="score-line">
      <span class="sc-ok">⭕ 맞음 ${state.totalCorrect}</span>
      <span class="sc-no">❌ 틀림 ${state.totalAttempts - state.totalCorrect}</span>
    </div>
    <div class="word-box">
      <div class="word">
        <span>${(spelling || writing) ? w.ko : w.en}</span>
        ${(spelling || writing) ? "" : `<button class="btn-speak" id="btn-speak" title="발음 듣기">🔊</button>`}
      </div>
      <div class="word-hint">${writing ? "아래 칸에 스펠링을 쓰세요 ✏️ (태블릿 손글씨 입력 가능)" : spelling ? "알맞은 영어 스펠링을 고르세요 (키보드 1~4)" : "알맞은 뜻을 고르세요 (키보드 1~4)"}</div>
    </div>
    ${writing ? `
    <input type="text" class="write-input" id="write-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="스펠링 쓰기">
    <div class="write-hint">태블릿에선 손글씨 키보드로 쓰면 글자로 바뀌어요</div>
    <button class="btn-next" id="btn-submit">제출 (Enter)</button>
    <button class="btn-alt" id="btn-reveal">✏️ 노트에 썼어요 — 정답 보고 직접 채점하기</button>
    <div id="reveal-area"></div>
    ` : `
    <div class="choices">
      ${choices.map((c, i) => `
        <button class="choice" data-i="${i}">
          <span class="num">${i + 1}</span><span>${c}</span>
        </button>`).join("")}
    </div>
    <div class="feedback" id="feedback"></div>`}
  `;

  document.getElementById("btn-restart").addEventListener("click", confirmRestart);
  const speakBtn = document.getElementById("btn-speak");
  if (speakBtn) speakBtn.addEventListener("click", () => speak(w.en));
  const revealBtn = document.getElementById("btn-reveal");
  if (revealBtn) revealBtn.addEventListener("click", revealAnswer);
  const submitBtn = document.getElementById("btn-submit");
  if (submitBtn) submitBtn.addEventListener("click", submitWriting);
  const writeInp = document.getElementById("write-input");
  if (writeInp) writeInp.focus();
  app.querySelectorAll(".choice").forEach(btn =>
    btn.addEventListener("click", () => answer(parseInt(btn.dataset.i)))
  );
  if (state.tts && state.mode === "meaning") speak(w.en); // 스펠링 모드에선 문제 낼 때 읽어주지 않음(힌트 방지)
}

// ===== 최고난도(쓰기) 모드: 입력 답 자동 채점 =====
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
// 대소문자·아포스트로피·띄어쓰기는 스펠링 실수로 치지 않음
// (펜 손글씨 입력 시 띄어쓰기가 어긋나는 경우가 많아 공백은 전부 무시하고 글자만 비교)
function normalizeAns(s) {
  return s.toLowerCase().replace(/['’]/g, "").replace(/[^a-z]+/g, "");
}
// "get in[on]" 같은 괄호 표기는 두 가지 답 모두 인정
function acceptedAnswers(en) {
  const set = new Set([normalizeAns(en)]);
  const m = en.match(/^(.*)\[(.+)\](.*)$/);
  if (m) {
    set.add(normalizeAns(m[1] + m[3]));
    const base = m[1].trim().split(" ");
    base[base.length - 1] = m[2];
    set.add(normalizeAns(base.join(" ") + m[3]));
  }
  return set;
}

function submitWriting() {
  if (state.answered || state.revealed) return;
  const inp = document.getElementById("write-input");
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  state.answered = true;
  const w = currentWord();
  const correct = acceptedAnswers(w.en).has(normalizeAns(val));

  state.totalAttempts++;
  if (correct) {
    state.totalCorrect++;
    if (state.round === 1 && state.isReview) bumpWrongStat(w.en, -1);
  } else {
    state.wrongThisRound.push(w);
    state.wrongCount[w.en] = (state.wrongCount[w.en] || 0) + 1;
    if (state.round === 1) bumpWrongStat(w.en, +1);
  }

  inp.disabled = true;
  document.getElementById("btn-submit").style.display = "none";
  document.getElementById("btn-reveal").style.display = "none";
  document.getElementById("reveal-area").innerHTML = `
    <div class="answer-reveal">
      <div class="feedback ${correct ? "ok" : "no"}" style="margin-top:0; margin-bottom:10px">${correct ? "⭕ 정답입니다!" : "❌ 틀렸어요!"}</div>
      ${correct ? "" : `<div class="my-answer">내가 쓴 답: <b>${escapeHtml(val)}</b></div>`}
      <div class="answer-label">정답 스펠링</div>
      <div class="answer-word"><span>${w.en}</span><button class="btn-speak" id="btn-speak2" title="발음 듣기">🔊</button></div>
    </div>
    <button class="btn-next" id="btn-next">${state.idx === state.queue.length - 1 && state.wrongThisRound.length === 0 ? "결과 보기 →" : "다음 문제 → (Enter)"}</button>`;
  document.getElementById("btn-speak2").addEventListener("click", () => speak(w.en));
  const nextBtn = document.getElementById("btn-next");
  nextBtn.addEventListener("click", nextQuestion);
  nextBtn.focus();
  if (state.tts) speak(w.en);
}

// ===== 최고난도(쓰기) 모드: 노트에 쓴 경우 — 정답 공개 → 스스로 채점 =====
function revealAnswer() {
  if (state.revealed) return;
  const btn = document.getElementById("btn-reveal");
  if (!btn) return;
  state.revealed = true;
  btn.style.display = "none";
  const inp = document.getElementById("write-input");
  if (inp) inp.disabled = true;
  const sub = document.getElementById("btn-submit");
  if (sub) sub.style.display = "none";
  const w = currentWord();
  document.getElementById("reveal-area").innerHTML = `
    <div class="answer-reveal">
      <div class="answer-label">정답 스펠링</div>
      <div class="answer-word"><span>${w.en}</span><button class="btn-speak" id="btn-speak2" title="발음 듣기">🔊</button></div>
      <div class="self-check-q">노트에 쓴 스펠링과 똑같나요? 스스로 채점하세요!</div>
      <div class="self-check">
        <button class="btn-self ok" id="btn-self-ok">⭕ 맞았어요 (1)</button>
        <button class="btn-self no" id="btn-self-no">❌ 틀렸어요 (2)</button>
      </div>
    </div>`;
  document.getElementById("btn-speak2").addEventListener("click", () => speak(w.en));
  document.getElementById("btn-self-ok").addEventListener("click", () => selfCheck(true));
  document.getElementById("btn-self-no").addEventListener("click", () => selfCheck(false));
  if (state.tts) speak(w.en);
}

function selfCheck(correct) {
  if (state.answered || !state.revealed) return;
  state.answered = true;
  const w = currentWord();
  state.totalAttempts++;
  if (correct) {
    state.totalCorrect++;
    if (state.round === 1 && state.isReview) bumpWrongStat(w.en, -1); // 복습에서 맞히면 통계 감소
  } else {
    state.wrongThisRound.push(w);
    state.wrongCount[w.en] = (state.wrongCount[w.en] || 0) + 1;
    if (state.round === 1) bumpWrongStat(w.en, +1); // 오답 통계 누적 (오답 라운드는 제외)
  }
  nextQuestion();
}

// ===== 답변 처리 =====
function answer(i) {
  if (state.answered) return;
  state.answered = true;

  const w = currentWord();
  const picked = state.currentChoices[i];
  const correct = picked === state.correctValue;

  state.totalAttempts++;
  if (correct) {
    state.totalCorrect++;
    if (state.round === 1 && state.isReview) bumpWrongStat(w.en, -1); // 복습에서 맞히면 통계 감소
  } else {
    state.wrongThisRound.push(w);
    state.wrongCount[w.en] = (state.wrongCount[w.en] || 0) + 1;
    if (state.round === 1) bumpWrongStat(w.en, +1); // 오답 통계 누적 (오답 라운드는 제외)
  }

  const btns = [...app.querySelectorAll(".choice")];
  btns.forEach((b, j) => {
    b.disabled = true;
    const val = state.currentChoices[j];
    if (val === state.correctValue) b.classList.add("correct");
    else if (j === i) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (correct ? "ok" : "no");
  fb.textContent = correct ? "⭕ 정답입니다!" : `❌ 틀렸어요! 정답: ${state.correctValue}`;
  if (state.tts && state.mode === "spelling") speak(w.en); // 정답 확인 후 발음 들려주기

  const next = document.createElement("button");
  next.className = "btn-next";
  next.id = "btn-next";
  const isLast = state.idx === state.queue.length - 1;
  next.textContent = isLast ? "결과 보기 →" : "다음 문제 → (Enter)";
  next.addEventListener("click", nextQuestion);
  fb.after(next);
  next.focus();
}

function nextQuestion() {
  state.idx++;
  if (state.idx < state.queue.length) {
    renderQuestion();
  } else if (state.wrongThisRound.length > 0) {
    // 오답 라운드 시작
    state.round++;
    state.queue = shuffle(state.wrongThisRound);
    state.wrongThisRound = [];
    state.idx = 0;
    renderQuestion();
  } else {
    renderResult();
  }
}

// ===== 결과 화면 =====
function renderResult() {
  speechSynthesis && speechSynthesis.cancel();
  const wrongEntries = Object.entries(state.wrongCount)
    .sort((a, b) => b[1] - a[1]);
  const accuracy = state.totalAttempts
    ? Math.round((state.totalCorrect / state.totalAttempts) * 100) : 0;
  const perfect = wrongEntries.length === 0;

  saveHistoryEntry({
    date: Date.now(),
    mode: state.mode,
    range: state.range,
    words: state.totalWords,
    attempts: state.totalAttempts,
    correct: state.totalCorrect,
    accuracy,
    rounds: state.round,
    wrongWords: Object.keys(state.wrongCount) // "최근 시험 오답 풀기"용
  });

  app.innerHTML = `
    <div class="result-emoji">${perfect ? "🏆" : accuracy >= 80 ? "🎉" : "💪"}</div>
    <div class="result-title">${perfect ? "완벽해요! 한 번에 다 맞혔어요!" : "모든 단어를 다 맞혔어요!"}</div>
    <div class="stats">
      <div class="stat"><div class="val" style="color:#27ae60">${state.totalCorrect}</div><div class="label">⭕ 맞음</div></div>
      <div class="stat"><div class="val" style="color:#e74c3c">${state.totalAttempts - state.totalCorrect}</div><div class="label">❌ 틀림</div></div>
      <div class="stat"><div class="val">${accuracy}%</div><div class="label">정답률</div></div>
      <div class="stat"><div class="val">${state.round}</div><div class="label">라운드</div></div>
    </div>
    ${perfect
      ? `<p class="perfect-msg">틀린 단어가 하나도 없어요 👏</p>`
      : `<div class="wrong-list-title">📌 틀렸던 단어 (복습하세요!)</div>
         <div class="wrong-list">
           ${wrongEntries.map(([en, cnt]) => {
             const w = ALL_WORDS.find(x => x.en === en);
             return `<div class="wrong-item">
               <span class="en">${en}</span>
               <span><span class="ko">${w.ko}</span><span class="cnt">${cnt}회 틀림</span></span>
             </div>`;
           }).join("")}
         </div>`}
    <button class="btn-primary" id="btn-again">처음부터 다시 하기</button>
  `;
  document.getElementById("btn-again").addEventListener("click", renderStart);
}

function confirmRestart() {
  if (confirm("정말 처음부터 다시 시작할까요? 지금까지의 진행이 사라집니다.")) {
    renderStart();
  }
}

// ===== 키보드 단축키 =====
document.addEventListener("keydown", e => {
  if (!state.queue) return;
  if (state.mode === "writing") {
    if (e.key === "Enter") {
      if (!state.answered && !state.revealed) submitWriting(); // 입력이 비어 있으면 무시됨
      else if (state.answered && document.getElementById("btn-next")
               && document.activeElement !== document.getElementById("btn-next")) nextQuestion();
    } else if (state.revealed && !state.answered && document.activeElement !== document.getElementById("write-input")) {
      if (e.key === "1") selfCheck(true);
      else if (e.key === "2") selfCheck(false);
    }
    return;
  }
  if (e.key >= "1" && e.key <= "4" && !state.answered) {
    const i = parseInt(e.key) - 1;
    const btn = app.querySelector(`.choice[data-i="${i}"]`);
    if (btn) answer(i);
  } else if (e.key === "Enter" && state.answered) {
    const btn = document.getElementById("btn-next");
    if (btn && document.activeElement !== btn) nextQuestion();
  }
});

renderStart();

// PWA: 홈 화면 설치 + 오프라인 지원 (업데이트는 네트워크 우선이라 자동 반영)
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
